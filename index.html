<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Piano Trainer</title>
    <link rel="stylesheet" href="style.css" />
    <link
      rel="stylesheet"
      href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;600;700&display=swap"
    />
  </head>
  <body>
    <div id="app">
      <header class="top-bar">
        <button id="lessonMenuButton" class="icon-button" aria-label="Lessons">Lessons</button>
        <div class="brand">Piano Trainer</div>
        <button id="settingsButton" class="icon-button" aria-label="Settings">Menu</button>
      </header>
      <main class="main">
        <section id="homeScreen" class="screen active">
          <div class="hero">
            <div class="hero-title">Ready to play?</div>
            <div class="hero-subtitle" id="currentPackLabel">Pack: Hanon Pack 1</div>
            <button id="startButton" class="primary-button">Start</button>
          </div>
        </section>
        <section id="practiceScreen" class="screen">
          <div class="score-panel">
            <div id="scoreViewport">
              <div id="outputExpected" class="staff-layer expected"></div>
              <div id="outputPlayed" class="staff-layer played"></div>
            </div>
            <div id="pianoRollViewport" class="hidden">
              <webaudio-pianoroll
                id="pianoRollExpected"
                width="1000"
                height="280"
                timebase="16"
                xrange="16"
                yrange="24"
                yoffset="48"
                editmode="dragpoly"
                xscroll="1"
                yscroll="0"
                grid="4"
                wheelzoom="0"
                collt="rgba(200,220,255,0.35)"
                coldk="rgba(170,200,255,0.35)"
                colnote="#3c6df0"
              ></webaudio-pianoroll>
              <webaudio-pianoroll
                id="pianoRollPlayed"
                width="1000"
                height="280"
                timebase="16"
                xrange="16"
                yrange="24"
                yoffset="48"
                editmode="dragpoly"
                xscroll="1"
                yscroll="0"
                grid="4"
                wheelzoom="0"
                collt="rgba(255,255,255,0)"
                coldk="rgba(255,255,255,0)"
                colnote="#16a34a"
              ></webaudio-pianoroll>
            </div>
            <div id="pianoKeysContainer"></div>
          </div>
          <div id="trainingStatus" class="training-status">
            <div id="playFeedback" class="play-feedback">Waiting for input</div>
            <div id="tempoIndicator" class="tempo-indicator">
              <span id="tempoDot" class="tempo-dot"></span>
              <span id="tempoLabel">Tempo 60 BPM</span>
            </div>
          </div>
          <p id="lessonTitle"></p>
        </section>
        <section id="statsScreen" class="screen">
          <div class="stats-panel">
            <div class="hero-title">Lesson Stats</div>
            <div id="statsList" class="stats-list"></div>
            <button id="backFromStats" class="primary-button">Back</button>
          </div>
        </section>
      </main>
      <div id="lessonMenu" class="sheet hidden" aria-hidden="true">
        <div class="sheet-header">
          <div class="sheet-title">Lesson Packs</div>
          <button class="icon-button" id="closeLessonMenu">Close</button>
        </div>
        <div id="lessonPackList" class="sheet-content"></div>
      </div>
      <div id="settingsPanel" class="sheet hidden" aria-hidden="true">
        <div class="sheet-header">
          <div class="sheet-title">Settings</div>
          <button class="icon-button" id="closeSettings">Close</button>
        </div>
        <div class="sheet-content">
          <div class="settings-row">
            <button id="showStatsButton">Show Lesson Stats</button>
          </div>
          <div class="settings-row">
            <label for="visualMode">Training view</label>
            <select id="visualMode">
              <option value="notes" selected>Staff Notes</option>
              <option value="piano-roll">Piano Roll</option>
            </select>
          </div>
          <div class="settings-row">
            <label for="practiceMode">Practice mode</label>
            <select id="practiceMode">
              <option value="read" selected>Read and play</option>
              <option value="imitation">Imitation</option>
            </select>
          </div>
          <div class="settings-row">
            <label for="tempoRatio">Tempo ratio (0.25x - 4x)</label>
            <input type="range" id="tempoRatio" min="0.25" max="4" step="0.05" value="1" />
            <div id="tempoRatioValue">1.00x</div>
          </div>
          <div class="settings-row">
            <label for="allKeys">Transpose key</label>
            <select id="allKeys"></select>
          </div>
          <div class="settings-row">
            <label for="majmin">Scale type</label>
            <select id="majmin">
              <option value="major" selected>Major</option>
              <option value="minor">Minor</option>
            </select>
          </div>
          <div class="settings-row">
            <label for="showPianoToggle">Show piano keys in training</label>
            <input type="checkbox" id="showPianoToggle" />
          </div>
          <div class="settings-row">
            <button id="nextButton">Next lesson</button>
            <button id="startMetronome">Start Metronome</button>
          </div>
          <div class="settings-row">
            <label for="accuracyTarget">Accuracy target</label>
            <input type="number" id="accuracyTarget" value="90" />
          </div>
          <div class="settings-row">
            <label for="timingWindow">Timing window (ms)</label>
            <input type="number" id="timingWindow" value="120" />
          </div>
          <div class="settings-row">
            <label for="releaseWindow">Release window (ms)</label>
            <input type="number" id="releaseWindow" value="150" />
          </div>
          <div class="settings-row">
            <label for="midiInputSelect">Input device</label>
            <select id="midiInputSelect"></select>
          </div>
          <div class="settings-row">
            <label for="playInputSoundToggle">Play my input sound</label>
            <input type="checkbox" id="playInputSoundToggle" checked />
          </div>
        </div>
      </div>
      <div id="sheetBackdrop" class="sheet-backdrop hidden"></div>
      <div id="pauseOverlay" class="pause-overlay hidden" aria-hidden="true">
        <div class="pause-card">
          <div class="hero-title">Paused</div>
          <div class="hero-subtitle">Press Esc or lowest C to resume</div>
          <div class="pause-actions">
            <button id="resumeTrainingButton" class="primary-button">Resume</button>
            <button id="stopTrainingButton">Stop</button>
          </div>
        </div>
      </div>
    </div>
    <script
      src="https://cdnjs.cloudflare.com/ajax/libs/vexflow/4.2.5/vexflow-min.js"
      integrity="sha512-6TxXkXvDGlTfA/gxa+Odoa/so4d4/bjB6c5lgyZq8OVWqUVoDm2dC2PSI4g8Shlc2RZ6FnS1jh792Fo3HRINnw=="
      crossorigin="anonymous"
      referrerpolicy="no-referrer"
    ></script>
    <script defer src="custom-piano-keys.min.js"></script>
    <script src="https://g200kg.github.io/webaudio-pianoroll/webaudio-pianoroll.js"></script>
    <script src="script.js" type="module"></script>
  </body>
</html>
